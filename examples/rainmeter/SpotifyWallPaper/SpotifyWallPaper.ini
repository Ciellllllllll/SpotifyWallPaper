[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=SpotifyWallPaper
Author=SpotifyWallPaper
Information=Minimal reader for the configurator-generated Rainmeter JSON.
Version=0.1

[Variables]
JsonPath=#@#NowPlaying.json
TextColor=246,247,251,255
AccentColor=242,198,106,255

[MeasureTitle]
Measure=Plugin
Plugin=WebParser
URL=file://#JsonPath#
RegExp=(?siU)"title":\s*"(.*)"
UpdateRate=1
StringIndex=1

[MeasureArtists]
Measure=Plugin
Plugin=WebParser
URL=[MeasureTitle]
RegExp=(?siU)"artists":\s*\[(.*)\]
UpdateRate=1
StringIndex=1

[MeasureProgress]
Measure=Plugin
Plugin=WebParser
URL=[MeasureTitle]
RegExp=(?siU)"progressRatio":\s*([0-9.]+)
UpdateRate=1
StringIndex=1

[MeterTitle]
Meter=String
MeasureName=MeasureTitle
X=12
Y=10
W=360
H=34
FontFace=Segoe UI
FontSize=16
FontWeight=700
FontColor=#TextColor#
AntiAlias=1
ClipString=1

[MeterArtists]
Meter=String
MeasureName=MeasureArtists
X=12
Y=44
W=360
H=24
FontFace=Segoe UI
FontSize=10
FontColor=190,200,210,255
AntiAlias=1
ClipString=1

[MeterProgressTrack]
Meter=Shape
X=12
Y=78
Shape=Rectangle 0,0,360,6,3 | Fill Color 255,255,255,45 | StrokeWidth 0

[MeterProgressFill]
Meter=Bar
MeasureName=MeasureProgress
X=12
Y=78
W=360
H=6
BarColor=#AccentColor#
SolidColor=0,0,0,0
BarOrientation=Horizontal
